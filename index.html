<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <button type="button" class="btn btn-primary">Click this button!</button>
    <div class="container">
        <div class="row">

            <div class="col">
                <h1>Our Menu</h1>

                <h2>Falafel</h2>
                <p>Chickpea, herbs and spices</p>
                <img src="falafel.jpg" alt="Falafel" class="img-fluid">

                <h2>Pasta Salad</h2>
                <p>Lettuce, vegetables and Mozerella</p>
                <img src="salad.jpg" alt="Pasta Salad" class="img-fluid">
            </div>

            <div class="col">
                <h2>Prices</h2>
                <table class="table">
                    <tbody>
                        <tr>
                            <td>Falafel</td>
                            <td>$10.00</td>
                        </tr>
                        <tr>
                            <td>Pasta Salad</td>
                            <td>$12.00</td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
